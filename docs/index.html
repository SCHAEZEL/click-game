<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>迷宫猎手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1a1008;
  --panel:#2d1f0f;
  --accent:#f97c4a;
  --border:#5a3f20;
  --text:#f5e6c8;
  --green:#4ade80;--blue:#60a5fa;--purple:#a855f7;--orange:#f97316;--red:#ef4444;
}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;font-size:14px}
#header{background:var(--panel);border-bottom:2px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.stage-tag{color:var(--accent);font-weight:700;font-size:15px;white-space:nowrap}
.progress-wrap{flex:1;min-width:120px;height:18px;background:#3d2a14;border-radius:9px;overflow:hidden;position:relative}
.progress-fill{height:100%;background:linear-gradient(90deg,#c55a2a,var(--accent));transition:width .3s}
.progress-step{position:absolute;top:0;bottom:0;width:2px;background:rgba(245,230,200,0.15)}
.map-info{font-size:12px;color:#a89070;white-space:nowrap}
#wb-countdown{font-size:12px;color:#c084fc;white-space:nowrap}
#main{display:flex;height:calc(100vh - 90px - 50px)}
#char-panel{width:170px;min-width:170px;background:var(--panel);border-right:2px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:12px 8px;gap:6px}
#char-icon{font-size:60px;line-height:1}
.char-name{font-size:12px;color:#a89070;text-align:center}
#char-atk-display{font-size:13px;color:var(--accent)}
#char-crit-display{font-size:13px;color:var(--accent)}
#game-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;cursor:pointer;position:relative;background:radial-gradient(ellipse at center,var(--panel),var(--bg));user-select:none}
#monster-zone{display:flex;flex-direction:column;align-items:center;gap:10px;padding:16px 24px;background:rgba(61,42,20,0.8);border-radius:16px;border:2px solid var(--border);min-width:280px}
#monster-sprite{font-size:72px;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.5));transition:transform .1s}
#monster-sprite.hit{animation:shake .15s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px) scale(.9)}75%{transform:translateX(8px) scale(.9)}}
#monster-name{font-weight:700;font-size:16px}
#monster-type{font-size:12px;color:#a89070}
.hp-wrap{width:200px;height:14px;background:#1a0a0a;border-radius:7px;border:1px solid #5a2020;overflow:hidden}
.hp-bar{height:100%;background:linear-gradient(90deg,#ef4444,#ff6b6b);border-radius:7px;transition:width .2s}
#hp-text{font-size:12px;color:#a89070}
#click-hint{font-size:13px;color:#a89070;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
#dmg-layer{position:fixed;inset:0;pointer-events:none;z-index:999}
.dmg-num{position:absolute;font-weight:900;font-size:24px;color:#ff4444;text-shadow:0 2px 4px rgba(0,0,0,.8);animation:floatUp .8s ease forwards}
.dmg-num.crit{color:#ffd700;font-size:30px}
@keyframes floatUp{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-70px);opacity:0}}
#click-effect{position:absolute;font-size:24px;animation:popFade .4s ease;pointer-events:none}
@keyframes popFade{0%{transform:scale(.5);opacity:1}100%{transform:scale(1.5) translateY(-30px);opacity:0}}
#drop-msg{position:absolute;bottom:20px;font-size:14px;color:var(--accent);font-weight:700;opacity:0;transition:opacity .3s}
#stats-panel{width:220px;min-width:220px;background:var(--panel);border-left:2px solid var(--border);padding:10px;display:flex;flex-direction:column;gap:4px;overflow-y:auto}
.stats-title{color:var(--accent);font-size:13px;font-weight:700;margin-bottom:4px}
.stat-row{display:flex;justify-content:space-between;font-size:12px}
.stat-row span:first-child{color:#a89070}
.stats-divider{height:1px;background:var(--border);margin:4px 0}
.btn{display:block;width:100%;padding:6px 10px;background:#3d2a14;border:1px solid var(--border);color:var(--text);border-radius:6px;cursor:pointer;font-size:12px;text-align:left}
.btn:hover{background:#5a3f20}
#equip-bar{height:50px;background:var(--panel);border-top:2px solid var(--border);display:flex;align-items:center;justify-content:center;gap:4px;padding:0 8px;flex-wrap:nowrap;overflow-x:auto}
.equip-slot{width:72px;height:44px;min-width:72px;background:#3d2a14;border:2px solid var(--border);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;cursor:pointer;flex-shrink:0;transition:border-color .2s}
.equip-slot:hover{border-color:var(--accent)}
.equip-slot.filled{border-color:currentColor}
.slot-icon{font-size:20px;line-height:1}
.slot-label{font-size:8px;color:#a89070;margin-top:1px}
/* Modal */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:none;align-items:center;justify-content:center}
#modal-overlay.active{display:flex}
#modal{background:var(--panel);border:2px solid var(--border);border-radius:12px;padding:20px;max-width:90vw;max-height:80vh;overflow-y:auto;min-width:300px}
.modal-title{color:var(--accent);font-size:16px;font-weight:700;margin-bottom:12px;text-align:center}
.modal-close{float:right;background:none;border:none;color:var(--text);font-size:18px;cursor:pointer}
/* Inventory */
#inv-modal .inv-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-top:8px}
.inv-slot{width:42px;height:42px;background:#3d2a14;border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;position:relative}
.inv-slot:hover{border-color:var(--accent)}
.inv-slot .eq-quality{position:absolute;bottom:1px;right:2px;font-size:8px;font-weight:700}
.inv-page{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.inv-page button{background:#3d2a14;border:1px solid var(--border);color:var(--text);padding:4px 12px;border-radius:4px;cursor:pointer}
.inv-sort{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.inv-sort button{padding:3px 8px;font-size:11px}
/* Equip detail */
#eq-detail{text-align:center}
#eq-detail .eq-icon{font-size:64px;margin:8px 0}
#eq-detail .eq-name{font-size:18px;font-weight:700;margin-bottom:8px}
.eq-stats{text-align:left;margin:8px 0}
.eq-stat{display:flex;justify-content:space-between;padding:2px 0;font-size:13px}
.eq-stat span:first-child{color:#a89070}
.eq-sets{margin-top:8px;font-size:12px;color:#a89070}
#eq-actions{display:flex;gap:8px;justify-content:center;margin-top:12px}
#eq-actions button{padding:8px 20px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:700}
#btn-equip{background:var(--accent);color:#fff}
#btn-disasm{background:#3d2a14;color:#a89070;border:1px solid var(--border)}
/* Skins */
#skins-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px}
.skin-card{background:#3d2a14;border:2px solid var(--border);border-radius:8px;padding:8px;text-align:center;cursor:pointer;transition:border-color .2s}
.skin-card:hover{border-color:var(--accent)}
.skin-card.owned{border-color:var(--green)}
.skin-card.active{border-color:var(--accent);background:#4a3010}
.skin-card .skin-icon{font-size:40px}
.skin-card .skin-name{font-size:11px;margin-top:4px}
.skin-card .skin-frags{font-size:10px;color:#a89070}
.skin-card .skin-lock{font-size:10px;color:#666}
.skin-card.owned .skin-lock{display:none}
/* World boss */
#wb-panel{background:#3d2a14;border:2px solid var(--purple);border-radius:10px;padding:10px;margin-top:8px}
.wb-title{color:var(--purple);font-size:12px;font-weight:700}
.wb-entry{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px}
.wb-entry .wb-name{font-size:28px}
.wb-entry .wb-hp-wrap{width:100px;height:8px;background:#1a0a0a;border-radius:4px;overflow:hidden}
.wb-entry .wb-hp-bar{height:100%;background:var(--purple);transition:width .2s}
.wb-entry .wb-hp-text{font-size:11px;color:#a89070}
.wb-btn{padding:4px 10px;background:var(--purple);border:none;border-radius:4px;color:#fff;cursor:pointer;font-size:11px}
.wb-btn:disabled{background:#555;cursor:not-allowed}
/* Toast */
#toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(45,31,15,.95);border:1px solid var(--border);padding:8px 20px;border-radius:20px;font-size:13px;z-index:900;display:none;white-space:nowrap}
/* World boss damage layer */
#wb-dmg-layer{position:fixed;inset:0;pointer-events:none;z-index:998}
/* Responsive */
@media(max-width:768px){
  #main{flex-direction:column;height:auto}
  #char-panel{width:100%;min-width:unset;flex-direction:row;flex-wrap:wrap;padding:8px;border-right:none;border-bottom:2px solid var(--border)}
  #char-icon{font-size:48px}
  #stats-panel{width:100%;min-width:unset;border-left:none;border-top:2px solid var(--border)}
  #equip-bar{height:auto;flex-wrap:wrap;padding:4px}
  .equip-slot{width:60px;height:40px;min-width:60px}
  .slot-icon{font-size:18px}
  #monster-zone{min-width:unset;width:90%}
  #monster-sprite{font-size:56px}
  #inv-modal .inv-grid{grid-template-columns:repeat(5,1fr)}
  #skins-grid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:480px){
  #header{flex-wrap:wrap;gap:6px}
  .progress-wrap{min-width:80px}
  .equip-slot{width:52px;height:36px;min-width:52px}
  .slot-icon{font-size:16px}
  .slot-label{font-size:7px}
  #skins-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div id="header">
  <div class="stage-tag">第 <span id="stage-num">1</span> 关</div>
  <div class="progress-wrap" id="map-progress">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
  <div class="map-info">进度: <span id="kill-count">0</span>/21</div>
  <div id="wb-countdown">世界BOSS: --:--:--</div>
</div>

<div id="main">
  <div id="char-panel">
    <div id="char-icon">🐕</div>
    <div class="char-name" id="char-label">狗 · 剑士</div>
    <div id="char-atk-display">攻击: <span id="char-atk">10</span></div>
    <div id="char-crit-display">暴击: <span id="char-crit">5</span>%</div>
    <button class="btn" onclick="showSkinsModal()" style="margin-top:4px">换皮肤</button>
    <div id="wb-panel" style="display:none">
      <div class="wb-title">世界BOSS</div>
      <div id="wb-list"></div>
    </div>
  </div>

  <div id="game-area" onclick="handleClick(event)">
    <div id="monster-zone">
      <div id="monster-sprite">&#x1F400;</div>
      <div id="monster-name">小怪 · Lv.1</div>
      <div id="monster-type" style="font-size:12px;color:#a89070"></div>
      <div class="hp-wrap"><div class="hp-bar" id="hp-bar"></div></div>
      <div id="hp-text">10 / 10</div>
    </div>
    <div id="click-hint">点击或按任意键攻击！</div>
    <div id="drop-msg"></div>
  </div>

  <div id="stats-panel">
    <div class="stats-title">战斗统计</div>
    <div class="stat-row"><span>总击杀</span><span id="stat-kills">0</span></div>
    <div class="stat-row"><span>通关次数</span><span id="stat-clears">0</span></div>
    <div class="stat-row"><span>装备掉落</span><span id="stat-drops">0</span></div>
    <div class="stat-row"><span>碎片获得</span><span id="stat-frags">0</span></div>
    <div class="stat-row"><span>分解装备</span><span id="stat-disasm">0</span></div>
    <div class="stats-divider"></div>
    <div class="stat-row"><span>攻击</span><span id="stat-atk">10</span></div>
    <div class="stat-row"><span>暴击率</span><span id="stat-crit">5%</span></div>
    <div class="stat-row"><span>速度</span><span id="stat-spd">1.0x</span></div>
    <div class="stat-row"><span>套装加成</span><span id="stat-set">无</span></div>
    <div class="stats-divider"></div>
    <button class="btn" onclick="showInvModal()">背包 (<span id="inv-count">0</span>/1000)</button>
    <button class="btn" onclick="disasmAll()">一键分解</button>
    <button class="btn" onclick="showBestiary()">怪物图鉴</button>
    <button class="btn" onclick="saveGame()">保存游戏</button>
    <button class="btn" onclick="resetGame()">重置游戏</button>
  </div>
</div>

<div id="equip-bar">
  <div class="equip-slot" data-slot="weapon" onclick="onEquipSlotClick('weapon')"><div class="slot-icon">&#x2694;</div><div class="slot-label">武器</div></div>
  <div class="equip-slot" data-slot="helmet" onclick="onEquipSlotClick('helmet')"><div class="slot-icon">&#x1F6D6;</div><div class="slot-label">头盔</div></div>
  <div class="equip-slot" data-slot="chest" onclick="onEquipSlotClick('chest')"><div class="slot-icon">&#x1F9BA;</div><div class="slot-label">胸甲</div></div>
  <div class="equip-slot" data-slot="legs" onclick="onEquipSlotClick('legs')"><div class="slot-icon">&#x1F456;</div><div class="slot-label">护腿</div></div>
  <div class="equip-slot" data-slot="gloves" onclick="onEquipSlotClick('gloves')"><div class="slot-icon">&#x1F9A4;</div><div class="slot-label">手套</div></div>
  <div class="equip-slot" data-slot="ring1" onclick="onEquipSlotClick('ring1')"><div class="slot-icon">&#x1F48D;</div><div class="slot-label">戒指</div></div>
  <div class="equip-slot" data-slot="ring2" onclick="onEquipSlotClick('ring2')"><div class="slot-icon">&#x1F48D;</div><div class="slot-label">戒指</div></div>
  <div class="equip-slot" data-slot="earring1" onclick="onEquipSlotClick('earring1')"><div class="slot-icon">&#x1F4FF;</div><div class="slot-label">耳环</div></div>
  <div class="equip-slot" data-slot="earring2" onclick="onEquipSlotClick('earring2')"><div class="slot-icon">&#x1F4FF;</div><div class="slot-label">耳环</div></div>
</div>

<div id="dmg-layer"></div>
<div id="wb-dmg-layer"></div>
<div id="toast"></div>

<!-- Inventory Modal -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// 常量配置
// ═══════════════════════════════════════════
const QUALITY_KEYS=['green','blue','purple','orange','red'];
const QUALITY_COLORS={green:'#4ade80',blue:'#60a5fa',purple:'#a855f7',orange:'#f97316',red:'#ef4444'};
const QUALITY_NAMES={green:'优秀',blue:'精良',purple:'史诗',orange:'传说',red:'神话'};
const DROP_RATES=[0.60,0.25,0.13,0.015,0.005];
const DROP_RATE_BOSS=[0.10,0.30,0.40,0.15,0.05];
const DROP_RATE_ELITE=[0.40,0.35,0.20,0.04,0.01];
const FRAG_DROP_RATE=0.08;
const FRAG_UNLOCK=10;
const MAX_INV=1000;
const PAGE_SIZE=30;
const MAP_NODES=21;
const WB_HOUR_A=8,WB_HOUR_B=20;
const SLOTS=['weapon','helmet','chest','legs','gloves','ring1','ring2','earring1','earring2'];
const SLOT_ICONS={weapon:'⚔️',helmet:'🪖',chest:'🦺',legs:'👖',gloves:'🧤',ring1:'💍',ring2:'💍',earring1:'📿',earring2:'📿'};
const SLOT_NAMES={weapon:'武器',helmet:'头盔',chest:'胸甲',legs:'护腿',gloves:'手套',ring1:'戒指',ring2:'戒指',earring1:'耳环',earring2:'耳环'};
const EMOJI_NORMAL='🐀';const EMOJI_ELITE='🐺';const EMOJI_BOSS='👹';const EMOJI_WB='🐉';
const SET_BONUSES={
  warrior:{name:'战士之力',pieces:{weapon:1,chest:1,legs:1},bonus:{atk:20,crit:5}},
  mage:{name:'法师奥术',pieces:{weapon:1,helmet:1,earring1:1},bonus:{atk:10,spd:0.2}},
  rogue:{name:'盗贼敏捷',pieces:{gloves:1,ring1:1,earring2:1},bonus:{atk:15,spd:0.15}},
  archer:{name:'猎人精准',pieces:{weapon:1,legs:1,earring1:1},bonus:{atk:12,crit:8}},
  dragon:{name:'巨龙之怒',pieces:{helmet:1,chest:1,gloves:1,legs:1},bonus:{atk:50,crit:10}}
};
const SKINS=[
  {id:'cat-archer',animal:'cat',cls:'archer',icon:'🐱',name:'猫·弓手',clsName:'弓手'},
  {id:'dog-warrior',animal:'dog',cls:'warrior',icon:'🐕',name:'狗·剑士',clsName:'剑士'},
  {id:'rabbit-mage',animal:'rabbit',cls:'mage',icon:'🐰',name:'兔·法师',clsName:'法师'},
  {id:'bird-rogue',animal:'bird',cls:'rogue',icon:'🐦',name:'鸟·盗贼',clsName:'盗贼'},
  {id:'cat-warrior',animal:'cat',cls:'warrior',icon:'🐱',name:'猫·剑士',clsName:'剑士'},
  {id:'dog-archer',animal:'dog',cls:'archer',icon:'🐕',name:'狗·弓手',clsName:'弓手'},
  {id:'rabbit-rogue',animal:'rabbit',cls:'rogue',icon:'🐰',name:'兔·盗贼',clsName:'盗贼'},
  {id:'bird-mage',animal:'bird',cls:'mage',icon:'🐦',name:'鸟·法师',clsName:'法师'},
  {id:'cat-mage',animal:'cat',cls:'mage',icon:'🐱',name:'猫·法师',clsName:'法师'},
  {id:'dog-rogue',animal:'dog',cls:'rogue',icon:'🐕',name:'狗·盗贼',clsName:'盗贼'},
  {id:'rabbit-warrior',animal:'rabbit',cls:'warrior',icon:'🐰',name:'兔·剑士',clsName:'剑士'},
  {id:'bird-archer',animal:'bird',cls:'archer',icon:'🐦',name:'鸟·弓手',clsName:'弓手'},
  {id:'cat-rogue',animal:'cat',cls:'rogue',icon:'🐱',name:'猫·盗贼',clsName:'盗贼'},
  {id:'dog-mage',animal:'dog',cls:'mage',icon:'🐕',name:'狗·法师',clsName:'法师'},
  {id:'rabbit-archer',animal:'rabbit',cls:'archer',icon:'🐰',name:'兔·弓手',clsName:'弓手'},
  {id:'bird-warrior',animal:'bird',cls:'warrior',icon:'🐦',name:'鸟·剑士',clsName:'剑士'}
];
const MONSTER_NAMES={
  normal:['哥布林','史莱姆','蝙蝠','骷髅'],
  elite:['精英狼','精英巨人','精英蜥蜴'],
  boss:['关卡BOSS'],
  wb:['世界BOSS·炎龙','世界BOSS·冰魔']
};
const STAT_NAMES={atk:'攻击',crit:'暴击率',spd:'速度',hp:'生命'};
const EQUIP_PREFIXES=['锋利的','坚固的','神秘的','狂暴的','神圣的','古老的','毁灭的','永恒的','夜影的'];

// ═══════════════════════════════════════════
// 游戏状态
// ═══════════════════════════════════════════
let G={
  player:{atk:10,crit:5,spd:1,baseAtk:10,baseCrit:5,baseSpd:1},
  currentStage:1,
  stageKills:0,
  totalKills:0,
  stageClears:0,
  inventory:[],
  equipped:{},
  skins:{},
  activeSkin:'dog-warrior',
  fragments:0,
  totalFragments:0,
  totalDrops:0,
  totalDisasm:0,
  worldBoss:{active:false,hps:[0,0],maxHps:[0,0],alive:[false,false],cooldown:0},
  wbHits:{}
};
let invPage=0,invSort='quality',invSlot=-1;
let monster=null;
let autoSaveTimer=null;

// ═══════════════════════════════════════════
// 工具函数
// ═══════════════════════════════════════════
function rollQuality(level,type='normal'){
  const rates=type==='boss'?DROP_RATE_BOSS:type==='elite'?DROP_RATE_ELITE:DROP_RATES;
  let r=Math.random();
  for(let i=0;i<rates.length;i++){
    let threshold=rates[i]+(level-1)*0.005;
    if(r<threshold)return QUALITY_KEYS[i];
    r-=rates[i];
  }
  return'green';
}
function getQualityColor(q){return QUALITY_COLORS[q]||'#fff'}
function getQualityName(q){return QUALITY_NAMES[q]||q}
function rand(n){return Math.floor(Math.random()*n)}
function randFrom(arr){return arr[rand(arr.length)]}
function clamp(v,min,max){return Math.max(min,Math.min(max,v))}

// ═══════════════════════════════════════════
// 装备生成
// ═══════════════════════════════════════════
function genEquip(level,quality,slot){
  const prefix=randFrom(EQUIP_PREFIXES);
  const q=quality||rollQuality(level);
  const atk=Math.floor((5+level*3)*(1+QUALITY_KEYS.indexOf(q)*0.5));
  const crit=Math.floor(rand(3)*(1+QUALITY_KEYS.indexOf(q)*0.3));
  const spd=parseFloat((0.05+rand(5)*0.02*(1+QUALITY_KEYS.indexOf(q)*0.2)).toFixed(2));
  const hp=Math.floor((20+level*10)*(1+QUALITY_KEYS.indexOf(q)*0.4));
  const set=Math.random()<0.15?randFrom(Object.keys(SET_BONUSES)):null;
  return{
    id:Date.now()+rand(100000),
    slot:slot||randFrom(SLOTS),
    quality:q,
    name:prefix+SLOT_NAMES[slot||randFrom(SLOTS)],
    level,
    atk,crit,spd,hp,
    set,
    emoji:SLOT_ICONS[slot||randFrom(SLOTS)]
  };
}
function equipStats(eq){
  return[
    eq.atk?{k:'atk',v:eq.atk}:null,
    eq.crit?{k:'crit',v:eq.crit}:null,
    eq.spd?{k:'spd',v:eq.spd}:null,
    eq.hp?{k:'hp',v:eq.hp}:null
  ].filter(Boolean);
}
function calcSetBonus(){
  const equipped=G.equipped;
  let activeSets=[];
  for(const setKey of Object.keys(SET_BONUSES)){
    const sb=SET_BONUSES[setKey];
    let count=0;
    for(const s of Object.keys(sb.pieces)){
      if(equipped[s]&&equipped[s].set===setKey)count++;
    }
    if(count>=3)activeSets.push({key:setKey,...sb});
  }
  let totalAtk=0,totalCrit=0,totalSpd=0;
  for(const s of activeSets){
    totalAtk+=s.bonus.atk||0;
    totalCrit+=s.bonus.crit||0;
    totalSpd+=s.bonus.spd||0;
  }
  G.player.atk=G.player.baseAtk+totalAtk;
  G.player.crit=clamp(G.player.baseCrit+totalCrit,0,100);
  G.player.spd=1+totalSpd;
  return activeSets;
}

// 怪物
// ═══════════════════════════════════════════
function spawnMonster(){
  const stage=G.currentStage;
  let type='normal',isBoss=false;
  if(G.worldBoss.active){
    const alive=G.worldBoss.alive.indexOf(true);
    if(alive>=0){
      type='wb';
      const wbNames=['🐉 炎龙','🐉 冰魔'];
      monster={
        type:'wb',isBoss:false,isWB:true,wbIndex:alive,
        level:stage+10,
        hp:G.worldBoss.hps[alive],
        maxHp:G.worldBoss.maxHps[alive],
        name:wbNames[alive]+' · Lv.'+(stage+10),
        emoji:EMOJI_WB
      };
      updateMonsterUI();return;
    }
  }
  if(G.stageKills>0&&G.stageKills%MAP_NODES===0){
    type='boss';isBoss=true;
  }else if(G.stageKills>0&&G.stageKills%7===0&&Math.random()<0.25){
    type='elite';
  }
  const baseHp=50+stage*15;
  let hpMult=type==='boss'?25:type==='elite'?6:1;
  const names=MONSTER_NAMES[type];
  const emoji=type==='normal'?EMOJI_NORMAL:type==='elite'?EMOJI_ELITE:type==='boss'?EMOJI_BOSS:EMOJI_WB;
  monster={
    type,isBoss,isWB:false,
    level:stage,
    hp:Math.floor(baseHp*hpMult),
    maxHp:Math.floor(baseHp*hpMult),
    name:randFrom(names)+(isBoss?' · BOSS':'')+' · Lv.'+stage,
    emoji
  };
  updateMonsterUI();
}
function updateMonsterUI(){
  if(!monster)return;
  document.getElementById('monster-sprite').textContent=monster.emoji;
  document.getElementById('monster-name').textContent=monster.name;
  const typeLabel={
    normal:'普通怪物',
    elite:'精英怪物',
    boss:'BOSS',
    wb:'世界BOSS'
  };
  document.getElementById('monster-type').textContent=typeLabel[monster.type]||'';
  const pct=clamp(monster.hp/monster.maxHp*100,0,100);
  document.getElementById('hp-bar').style.width=pct+'%';
  document.getElementById('hp-text').textContent=Math.max(0,monster.hp)+' / '+monster.maxHp;
}
function updateMapProgress(){
  const pct=clamp(G.stageKills/MAP_NODES*100,0,100);
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('kill-count').textContent=G.stageKills;
  // Build step dots
  const wrap=document.getElementById('map-progress');
  wrap.querySelectorAll('.progress-step').forEach(e=>e.remove());
  for(let i=1;i<MAP_NODES;i++){
    const dot=document.createElement('div');
    dot.className='progress-step';
    dot.style.left=(i/MAP_NODES*100)+'%';
    wrap.appendChild(dot);
  }
}

// 攻击逻辑
// ═══════════════════════════════════════════
function handleClick(e){
  if(!monster)return;
  const critRoll=Math.random()*100;
  const isCrit=critRoll<G.player.crit;
  let dmg=Math.floor(G.player.atk*G.player.spd*(isCrit?2.5:1));
  if(monster.isWB){
    dmg=Math.floor(dmg*0.1);
  }
  monster.hp-=dmg;
  const ex=e||{clientX:300+Math.random()*400,clientY:200+Math.random()*200};
  showDamageNumber(dmg,isCrit,ex,monster.isWB);
  const sprite=document.getElementById('monster-sprite');
  sprite.classList.remove('hit');
  void sprite.offsetWidth;
  sprite.classList.add('hit');
  if(monster.hp<=0){
    onMonsterKill();
  }
  updateMonsterUI();
}
function onMonsterKill(){
  G.totalKills++;
  G.stageKills++;
  document.getElementById('stat-kills').textContent=G.totalKills;
  updateMapProgress();
  // Drop equip
  const q=rollQuality(monster.level,monster.type);
  const eq=genEquip(monster.level,q);
  if(G.inventory.length<MAX_INV){
    G.inventory.push(eq);
    G.totalDrops++;
    document.getElementById('stat-drops').textContent=G.totalDrops;
    showDropMsg('获得 '+getQualityName(q)+' '+eq.name);
  }
  // Fragment drop
  if(Math.random()<FRAG_DROP_RATE){
    G.fragments++;
    G.totalFragments++;
    document.getElementById('stat-frags').textContent=G.totalFragments;
    showToast('获得碎片 x1 (已有 '+G.fragments+'/'+FRAG_UNLOCK+')','#c084fc');
  }
  // World boss kill
  if(monster.isWB){
    G.worldBoss.alive[monster.wbIndex]=false;
    G.worldBoss.hps[monster.wbIndex]=0;
    showToast('击退了世界BOSS！','#a855f7');
    updateWorldBossUI();
    monster=null;
    setTimeout(()=>spawnMonster(),500);
    return;
  }
  // Stage clear
  if(monster.isBoss||G.stageKills>=MAP_NODES){
    G.currentStage++;
    G.stageKills=0;
    G.stageClears++;
    document.getElementById('stat-clears').textContent=G.stageClears;
    document.getElementById('stage-num').textContent=G.currentStage;
    showToast('🎉 通关第 '+(G.currentStage-1)+' 关！进入第 '+G.currentStage+' 关！');
    updateMapProgress();
  }
  monster=null;
  setTimeout(()=>spawnMonster(),300);
}
function showDamageNumber(damage,isCrit,e,isWB){
  const layer=isWB?document.getElementById('wb-dmg-layer'):document.getElementById('dmg-layer');
  const div=document.createElement('div');
  div.className='dmg-num'+(isCrit?' crit':'');
  div.textContent=(isCrit?'💥 ':'')+damage;
  div.style.left=(e.clientX+rand(60)-30)+'px';
  div.style.top=(e.clientY+rand(40)-20)+'px';
  layer.appendChild(div);
  setTimeout(()=>div.remove(),800);
}
function showDropMsg(msg){
  const el=document.getElementById('drop-msg');
  el.textContent=msg;
  el.style.opacity='1';
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.style.opacity='0',2000);
}

// ═══════════════════════════════════════════
// 世界BOSS
// ═══════════════════════════════════════════
function getNextWBTimes(){
  const now=new Date();
  const tzOffset=8*3600000;
  const today8=new Date(now.getFullYear(),now.getMonth(),now.getDate(),8,0,0,0);
  const today20=new Date(now.getFullYear(),now.getMonth(),now.getDate(),20,0,0,0);
  let nextA=today8.getTime(),nextB=today20.getTime();
  if(nextA<=now.getTime())nextA+=86400000;
  if(nextB<=now.getTime())nextB+=86400000;
  return[Math.min(nextA,nextB),Math.max(nextA,nextB)];
}
function updateWBCountdown(){
  const[next]=getNextWBTimes();
  const diff=next-new Date().getTime();
  if(diff<=0){
    document.getElementById('wb-countdown').textContent='世界BOSS已刷新！';
    if(!G.worldBoss.active)activateWorldBoss();
    return;
  }
  const h=Math.floor(diff/3600000);
  const m=Math.floor((diff%3600000)/60000);
  const s=Math.floor((diff%60000)/1000);
  document.getElementById('wb-countdown').textContent=
    '世界BOSS: '+String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function activateWorldBoss(){
  G.worldBoss.active=true;
  G.worldBoss.alive=[true,true];
  G.worldBoss.maxHps=[50000,50000];
  G.worldBoss.hps=[50000,50000];
  G.wbHits={};
  const panel=document.getElementById('wb-panel');
  panel.style.display='block';
  updateWorldBossUI();
  showToast('🐉 世界BOSS出现了！快去挑战！','#a855f7');
}
function updateWorldBossUI(){
  const list=document.getElementById('wb-list');
  const names=['炎龙','冰魔'];
  list.innerHTML='';
  for(let i=0;i<2;i++){
    const alive=G.worldBoss.alive[i];
    const hp=G.worldBoss.hps[i];
    const maxHp=G.worldBoss.maxHps[i];
    const pct=alive?clamp(hp/maxHp*100,0,100):0;
    const div=document.createElement('div');
    div.className='wb-entry';
    div.innerHTML=`
      <div class="wb-name">${alive?'🐉':'⚰️'}</div>
      <div style="flex:1;margin:0 8px">
        <div style="font-size:11px">${names[i]}</div>
        ${alive?`<div class="wb-hp-wrap"><div class="wb-hp-bar" style="width:${pct}%"></div></div>
        <div class="wb-hp-text">${hp.toLocaleString()} / ${maxHp.toLocaleString()}</div>`:'<div style="font-size:11px;color:#666">已击败</div>'}
      </div>
      <button class="wb-btn" onclick="attackWB(${i})" ${alive?'':'disabled'}>攻击</button>
    `;
    list.appendChild(div);
  }
}
function attackWB(index){
  if(!G.worldBoss.active||!G.worldBoss.alive[index])return;
  const critRoll=Math.random()*100;
  const isCrit=critRoll<G.player.crit;
  let dmg=Math.floor(G.player.atk*G.player.spd*10*(isCrit?2.5:1));
  G.worldBoss.hps[index]-=dmg;
  if(G.worldBoss.hps[index]<=0){
    G.worldBoss.hps[index]=0;
    G.worldBoss.alive[index]=false;
    G.totalKills++;
    G.stageKills++;
    document.getElementById('stat-kills').textContent=G.totalKills;
    updateMapProgress();
    // Reward
    for(let k=0;k<3;k++){
      if(G.inventory.length<MAX_INV){
        const eq=genEquip(G.currentStage+10,'orange');
        G.inventory.push(eq);
        G.totalDrops++;
      }
    }
    G.fragments+=2;
    G.totalFragments+=2;
    document.getElementById('stat-drops').textContent=G.totalDrops;
    document.getElementById('stat-frags').textContent=G.totalFragments;
    showToast('击败了世界BOSS！获得3件传说装备和2个碎片！','#a855f7');
    const allDead=G.worldBoss.alive.every(a=>!a);
    if(allDead){
      G.worldBoss.active=false;
      document.getElementById('wb-panel').style.display='none';
    }
  }
  updateWorldBossUI();
  const x=200+index*300+Math.random()*100;
  showDamageNumber(dmg,isCrit,{clientX:x,clientY:200},true);
}

// ═══════════════════════════════════════════
// 装备系统
// ═══════════════════════════════════════════
function equipItem(eq){
  const slot=eq.slot;
  // Unequip current
  if(G.equipped[slot]){
    G.inventory.push(G.equipped[slot]);
  }
  G.equipped[slot]=eq;
  // Remove from inv
  const idx=G.inventory.findIndex(e=>e.id===eq.id);
  if(idx>=0)G.inventory.splice(idx,1);
  refreshEquipBar();
  refreshStats();
  document.getElementById('inv-count').textContent=G.inventory.length;
  const qc=getQualityColor(eq.quality);
  showToast('已穿戴 '+getQualityName(eq.quality)+' '+eq.name,qc);
}
function unequipSlot(slot){
  if(!G.equipped[slot])return;
  if(G.inventory.length>=MAX_INV){
    showToast('背包已满！','#ef4444');return;
  }
  G.inventory.push(G.equipped[slot]);
  delete G.equipped[slot];
  refreshEquipBar();
  refreshStats();
  document.getElementById('inv-count').textContent=G.inventory.length;
}
function refreshEquipBar(){
  for(const slot of SLOTS){
    const el=document.querySelector('.equip-slot[data-slot="'+slot+'"]');
    if(!el)continue;
    const eq=G.equipped[slot];
    if(eq){
      el.innerHTML='<div class="slot-icon">'+eq.emoji+'</div><div class="slot-label" style="color:'+getQualityColor(eq.quality)+'">'+eq.name.substring(0,3)+'</div>';
      el.style.color=getQualityColor(eq.quality);
      el.classList.add('filled');
    }else{
      el.innerHTML='<div class="slot-icon">'+SLOT_ICONS[slot]+'</div><div class="slot-label">'+SLOT_NAMES[slot]+'</div>';
      el.style.color='';
      el.classList.remove('filled');
    }
  }
}
function onEquipSlotClick(slot){
  if(G.equipped[slot]){
    // Show equip detail
    showEqDetail(G.equipped[slot]);
  }else{
    // Auto recommend best
    recommendEquip(slot);
  }
}
function recommendEquip(slot){
  const candidates=G.inventory.filter(e=>e.slot===slot);
  if(candidates.length===0){
    showToast('背包中没有该部位的装备','#a89070');return;
  }
  candidates.sort((a,b)=>{
    const qi=QUALITY_KEYS.indexOf(b.quality)-QUALITY_KEYS.indexOf(a.quality);
    if(qi!==0)return qi;
    return(b.atk||0)+(b.crit||0)*2-( (a.atk||0)+(a.crit||0)*2);
  });
  showEqDetail(candidates[0]);
}
function showEqDetail(eq){
  invSlot=eq.id;
  const qc=getQualityColor(eq.quality);
  let statsHtml='<div class="eq-stats">';
  for(const s of equipStats(eq)){
    const label=STAT_NAMES[s.k]||s.k;
    const sign=s.k==='spd'?'+':'+';
    statsHtml+=`<div class="eq-stat"><span>${label}</span><span style="color:${qc}">${sign}${s.v}${s.k==='crit'?'%':s.k==='spd'?'x':''}</span></div>`;
  }
  if(eq.set){
    const setInfo=SET_BONUSES[eq.set];
    statsHtml+=`<div class="eq-stat"><span>套装</span><span style="color:#a855f7">${setInfo?setInfo.name:'?'}</span></div>`;
  }
  statsHtml+='</div>';
  let setBonusHtml='';
  if(eq.set){
    const sb=SET_BONUSES[eq.set];
    if(sb){
      setBonusHtml='<div class="eq-sets">套装: '+sb.name+' (${Object.keys(sb.pieces).length}件)<br>';
      for(const b of Object.keys(sb.bonus)){
        setBonusHtml+=STAT_NAMES[b]+': +${sb.bonus[b]}${b==="crit"?"%":b==="spd"?"x":""} ';
      }
      setBonusHtml+='</div>';
    }
  }
  const isEquipped=Object.values(G.equipped).some(e=>e&&e.id===eq.id);
  document.getElementById('modal-content').innerHTML=`
    <div id="eq-detail">
      <div class="eq-icon" style="color:${qc}">${eq.emoji}</div>
      <div class="eq-name" style="color:${qc}">${eq.name}</div>
      <div style="font-size:12px;color:#a89070">${getQualityName(eq.quality)} · Lv.${eq.level} · ${SLOT_NAMES[eq.slot]}</div>
      ${statsHtml}
      ${setBonusHtml}
      <div id="eq-actions">
        ${isEquipped?
          '<button id="btn-equip" onclick="unequipFromDetail()">卸下</button>':
          '<button id="btn-equip" onclick="equipFromDetail()">穿戴</button>'}
        <button id="btn-disasm" onclick="disasmFromDetail()">分解</button>
        <button id="btn-disasm" onclick="closeModal()">关闭</button>
      </div>
    </div>
  `;
  openModal();
}
function equipFromDetail(){
  const eq=G.inventory.find(e=>e.id===invSlot);
  if(eq)equipItem(eq);
  closeModal();
}
function unequipFromDetail(){
  const slot=G.inventory.find(e=>e.id===invSlot)?.slot;
  if(slot)unequipSlot(slot);
  closeModal();
}
function disasmFromDetail(){
  const idx=G.inventory.findIndex(e=>e.id===invSlot);
  if(idx>=0){
    G.inventory.splice(idx,1);
    G.totalDisasm++;
    document.getElementById('stat-disasm').textContent=G.totalDisasm;
    showToast('装备已分解','#a89070');
  }
  closeModal();
  document.getElementById('inv-count').textContent=G.inventory.length;
}
function disasmAll(){
  if(G.inventory.length===0){showToast('背包是空的','#a89070');return;}
  const count=G.inventory.length;
  G.totalDisasm+=count;
  G.inventory=[];
  document.getElementById('stat-disasm').textContent=G.totalDisasm;
  document.getElementById('inv-count').textContent=0;
  refreshEquipBar();
  refreshStats();
  showToast('已分解 '+count+' 件装备','#a89070');
}

// ═══════════════════════════════════════════
// 背包系统
// ═══════════════════════════════════════════
function showInvModal(){
  renderInvPage();
  openModal();
}
function renderInvPage(){
  let items=[...G.inventory];
  if(invSort==='quality')items.sort((a,b)=>QUALITY_KEYS.indexOf(b.quality)-QUALITY_KEYS.indexOf(a.quality));
  else if(invSort==='level')items.sort((a,b)=>b.level-a.level);
  else if(invSort==='slot')items.sort((a,b)=>SLOTS.indexOf(a.slot)-SLOTS.indexOf(b.slot));
  const totalPages=Math.max(1,Math.ceil(items.length/PAGE_SIZE));
  invPage=clamp(invPage,0,totalPages-1);
  const pageItems=items.slice(invPage*PAGE_SIZE,(invPage+1)*PAGE_SIZE);
  let gridHtml='<div class="inv-grid">';
  for(let i=0;i<PAGE_SIZE;i++){
    const eq=pageItems[i];
    if(eq){
      const qc=getQualityColor(eq.quality);
      gridHtml+=`<div class="inv-slot" onclick="showEqDetail(G.inventory.find(x=>x.id===${eq.id}))" style="border-color:${qc}">
        <span>${eq.emoji}</span>
        <span class="eq-quality" style="color:${qc}">${eq.name.charAt(0)}</span>
      </div>`;
    }else{
      gridHtml+='<div class="inv-slot" style="opacity:0.3"></div>';
    }
  }
  gridHtml+='</div>';
  document.getElementById('modal-content').innerHTML=`
    <div class="modal-title">背包 (${G.inventory.length}/${MAX_INV})</div>
    <div class="inv-sort">
      <button onclick="setSort('quality')" ${invSort==='quality'?'style="background:#5a3f20"':''}>品质</button>
      <button onclick="setSort('level')" ${invSort==='level'?'style="background:#5a3f20"':''}>等级</button>
      <button onclick="setSort('slot')" ${invSort==='slot'?'style="background:#5a3f20"':''}>部位</button>
    </div>
    ${gridHtml}
    <div class="inv-page">
      <button onclick="prevInvPage()">上一页</button>
      <span style="font-size:12px">${invPage+1}/${totalPages}</span>
      <button onclick="nextInvPage()">下一页</button>
    </div>
  `;
}
function setSort(s){invSort=s;invPage=0;renderInvPage()}
function prevInvPage(){invPage--;renderInvPage()}
function nextInvPage(){invPage++;renderInvPage()}

// ═══════════════════════════════════════════
// 换肤系统
// ═══════════════════════════════════════════
function showSkinsModal(){
  const skinData=SKINS.map(s=>{
    const owned=G.skins[s.id]||false;
    const frags=G.fragments;
    const locked=!owned&&frags<FRAG_UNLOCK;
    const active=G.activeSkin===s.id;
    return{...s,owned,locked,active};
  });
  let html='<div class="modal-title">角色换肤</div>';
  html+='<div style="font-size:12px;color:#a89070;margin-bottom:8px">碎片: '+G.fragments+'/'+FRAG_UNLOCK+' (需'+FRAG_UNLOCK+'解锁) | 当前: '+SKINS.find(s=>s.id===G.activeSkin)?.name+'</div>';
  html+='<div id="skins-grid">';
  for(const s of skinData){
    const cls=[];
    if(s.owned)cls.push('owned');
    if(s.active)cls.push('active');
    if(s.locked)cls.push('locked');
    html+=`<div class="skin-card ${cls.join(' ')}" onclick="onSkinClick('${s.id}')">
      <div class="skin-icon">${s.icon}</div>
      <div class="skin-name">${s.name}</div>
      <div class="skin-frags">${s.owned?'已拥有':'碎片 '+G.fragments+'/'+FRAG_UNLOCK}</div>
      ${s.locked?'<div class="skin-lock">🔒 '+FRAG_UNLOCK+'碎片解锁</div>':''}
      ${s.active?'<div style="color:var(--accent);font-size:10px">穿戴中</div>':''}
    </div>`;
  }
  html+='</div>';
  html+='<div style="margin-top:12px;font-size:12px;color:#a89070">职业加成: 剑士(攻击+暴击) 法师(攻击+速度) 盗贼(攻击+速度) 弓手(攻击+暴击)</div>';
  document.getElementById('modal-content').innerHTML=html;
  openModal();
}
function onSkinClick(id){
  const owned=G.skins[id];
  if(!owned){
    if(G.fragments>=FRAG_UNLOCK){
      G.fragments-=FRAG_UNLOCK;
      G.skins[id]=true;
      showToast('解锁了 '+SKINS.find(s=>s.id===id)?.name,'#4ade80');
    }else{
      showToast('碎片不足，需要 '+FRAG_UNLOCK+' 个碎片','#ef4444');
      return;
    }
  }
  G.activeSkin=id;
  const skin=SKINS.find(s=>s.id===id);
  if(skin){
    document.getElementById('char-icon').textContent=skin.icon;
    document.getElementById('char-label').textContent=skin.name;
    // Update base stats by class
    const clsStats={
      warrior:{atk:12,crit:6,spd:1},
      mage:{atk:8,crit:3,spd:1.2},
      rogue:{atk:10,crit:5,spd:1.15},
      archer:{atk:11,crit:8,spd:1}
    };
    const cs=clsStats[skin.cls]||clsStats.warrior;
    G.player.baseAtk=cs.atk;
    G.player.baseCrit=cs.crit;
    G.player.baseSpd=cs.spd;
    refreshStats();
    refreshEquipBar();
  }
  showSkinsModal();
}

// ═══════════════════════════════════════════
// 统计刷新
// ═══════════════════════════════════════════
function refreshStats(){
  calcSetBonus();
  document.getElementById('char-atk').textContent=G.player.atk;
  document.getElementById('char-crit').textContent=G.player.crit;
  document.getElementById('stat-atk').textContent=G.player.atk;
  document.getElementById('stat-crit').textContent=G.player.crit+'%';
  document.getElementById('stat-spd').textContent=G.player.spd.toFixed(2)+'x';
  const sets=calcSetBonus();
  document.getElementById('stat-set').textContent=sets.length>0?sets.map(s=>s.name).join(', '):'无';
  document.getElementById('inv-count').textContent=G.inventory.length;
}

// ═══════════════════════════════════════════
// 弹窗
// ═══════════════════════════════════════════
function openModal(){
  document.getElementById('modal-overlay').classList.add('active');
}
function closeModal(e){
  if(e&&e.target!==document.getElementById('modal-overlay'))return;
  document.getElementById('modal-overlay').classList.remove('active');
}
function showToast(msg,color){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.color=color||'var(--text)';
  t.style.display='block';
  clearTimeout(t._t);
  t._t=setTimeout(()=>t.style.display='none',2500);
}

// ═══════════════════════════════════════════
// 存档系统
// ═══════════════════════════════════════════
function saveGame(){
  const saveData={
    player:G.player,
    currentStage:G.currentStage,
    stageKills:G.stageKills,
    totalKills:G.totalKills,
    stageClears:G.stageClears,
    inventory:G.inventory,
    equipped:G.equipped,
    skins:G.skins,
    activeSkin:G.activeSkin,
    fragments:G.fragments,
    totalFragments:G.totalFragments,
    totalDrops:G.totalDrops,
    totalDisasm:G.totalDisasm,
    worldBoss:G.worldBoss,
    version:1
  };
  try{
    localStorage.setItem('mazeHunterSave',JSON.stringify(saveData));
    showToast('游戏已保存','#4ade80');
  }catch(e){
    showToast('保存失败: '+e.message,'#ef4444');
  }
}
function loadGame(){
  try{
    const raw=localStorage.getItem('mazeHunterSave');
    if(!raw)return false;
    const data=JSON.parse(raw);
    if(data.version!==1)return false;
    G.player=data.player||G.player;
    G.currentStage=data.currentStage||1;
    G.stageKills=data.stageKills||0;
    G.totalKills=data.totalKills||0;
    G.stageClears=data.stageClears||0;
    G.inventory=data.inventory||[];
    G.equipped=data.equipped||{};
    G.skins=data.skins||{};
    G.activeSkin=data.activeSkin||'dog-warrior';
    G.fragments=data.fragments||0;
    G.totalFragments=data.totalFragments||0;
    G.totalDrops=data.totalDrops||0;
    G.totalDisasm=data.totalDisasm||0;
    G.worldBoss=data.worldBoss||{active:false,hps:[0,0],maxHps:[0,0],alive:[false,false],cooldown:0};
    return true;
  }catch(e){return false;}
}
function resetGame(){
  if(!confirm('确定要重置所有进度吗？'))return;
  localStorage.removeItem('mazeHunterSave');
  location.reload();
}
function startAutoSave(){
  autoSaveTimer=setInterval(()=>{
    const saveData={
      player:G.player,currentStage:G.currentStage,stageKills:G.stageKills,
      totalKills:G.totalKills,stageClears:G.stageClears,
      inventory:G.inventory,equipped:G.equipped,skins:G.skins,
      activeSkin:G.activeSkin,fragments:G.fragments,
      totalFragments:G.totalFragments,totalDrops:G.totalDrops,
      totalDisasm:G.totalDisasm,worldBoss:G.worldBoss,version:1
    };
    try{localStorage.setItem('mazeHunterSave',JSON.stringify(saveData));}catch(e){}
  },30000);
}

// ═══════════════════════════════════════════
// 键盘支持
// ═══════════════════════════════════════════
document.addEventListener('keydown',(e)=>{
  if(e.repeat)return;
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  handleClick({clientX:300+Math.random()*400,clientY:250+Math.random()*200});
});

// ═══════════════════════════════════════════
// 初始化
// ═══════════════════════════════════════════
(function init(){
  const loaded=loadGame();
  if(loaded){
    // Apply skin
    const skin=SKINS.find(s=>s.id===G.activeSkin);
    if(skin){
      document.getElementById('char-icon').textContent=skin.icon;
      document.getElementById('char-label').textContent=skin.name;
    }
    if(G.worldBoss.active){
      document.getElementById('wb-panel').style.display='block';
      updateWorldBossUI();
    }
  }
  // Stats from skin
  const skin=SKINS.find(s=>s.id===G.activeSkin);
  if(skin){
    const clsStats={warrior:{atk:12,crit:6,spd:1},mage:{atk:8,crit:3,spd:1.2},rogue:{atk:10,crit:5,spd:1.15},archer:{atk:11,crit:8,spd:1}};
    const cs=clsStats[skin.cls]||clsStats.warrior;
    G.player.baseAtk=G.player.baseAtk||cs.atk;
    G.player.baseCrit=G.player.baseCrit||cs.crit;
    G.player.baseSpd=G.player.baseSpd||cs.spd;
  }
  refreshStats();
  refreshEquipBar();
  updateMapProgress();
  document.getElementById('stat-kills').textContent=G.totalKills;
  document.getElementById('stat-clears').textContent=G.stageClears;
  document.getElementById('stat-drops').textContent=G.totalDrops;
  document.getElementById('stat-frags').textContent=G.totalFragments;
  document.getElementById('stat-disasm').textContent=G.totalDisasm;
  document.getElementById('inv-count').textContent=G.inventory.length;
  document.getElementById('stage-num').textContent=G.currentStage;
  spawnMonster();
  updateMonsterUI();
  setInterval(updateWBCountdown,1000);
  updateWBCountdown();
  // Check if world boss should be active
  const[nextA,nextB]=getNextWBTimes();
  const now=Date.now();
  if(now>=nextA-300000||now>=nextB-300000){
    activateWorldBoss();
  }
  startAutoSave();
  if(!loaded)showToast('欢迎来到迷宫猎手！点击开始冒险！','#f97c4a');
})();
</script>
